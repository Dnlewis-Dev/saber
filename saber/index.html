<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saber Chat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <main class="app">
      <header class="app__header">
        <div class="brand">
          <div class="brand__dot" aria-hidden="true"></div>
          <div>
            <h1 class="brand__title">Saber Chat</h1>
            <p class="brand__subtitle">Assignment 1</p>
          </div>
        </div>
      </header>

      <section class="chat" aria-label="Chat interface">
        <ul
          id="messageList"
          class="chat__messages"
          aria-label="Message list"
          aria-live="polite"
        >
          <li class="msg msg--bot">
            <div class="msg__bubble">
              <p class="msg__text">
                Hi! Type a message and hit Send. (This is still the static
                version.)
              </p>
              <span class="msg__meta">Bot</span>
            </div>
          </li>
        </ul>

        <form id="chatForm" class="chat__composer" autocomplete="off">
          <label class="sr-only" for="messageInput">Type a message</label>
          <input
            id="messageInput"
            class="chat__input"
            type="text"
            placeholder="Type your message…"
                maxlength="500"
            required
          />

          <button id="sendBtn" class="chat__send" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
